{% extends "base.html" %}
{% block title %}{{ 'Редактировать' if action == 'edit' else 'Добавить' }} дисциплину{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-title">
    {{ 'Редактировать дисциплину' if action == 'edit' else 'Новая дисциплина' }}
  </div>
  <div class="page-subtitle">
    <a href="{{ url_for('subjects_list') }}" style="color:var(--clr-muted);text-decoration:none">
      <i class="bi bi-arrow-left me-1"></i>Назад к списку
    </a>
  </div>
</div>

<div class="row">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header"><i class="bi bi-journal-text me-2"></i>Данные дисциплины</div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Название дисциплины *</label>
            <input type="text" name="name" class="form-control"
                   placeholder="Машинное обучение"
                   value="{{ subject.name if subject else '' }}" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Код дисциплины</label>
            <input type="text" name="code" class="form-control"
                   placeholder="CS401"
                   value="{{ subject.code if subject else '' }}">
          </div>

          <div class="mb-4">
            <label class="form-label">Описание</label>
            <textarea name="description" class="form-control" rows="3"
                      placeholder="Краткое описание дисциплины...">{{ subject.description if subject else '' }}</textarea>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-1"></i>
              {{ 'Сохранить' if action == 'edit' else 'Добавить дисциплину' }}
            </button>
            <a href="{{ url_for('subjects_list') }}" class="btn btn-outline-secondary">Отмена</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
